<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f1efe9;color:#1a1916;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:32px 24px calc(32px + env(safe-area-inset-bottom,0px))}
.w{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;max-width:300px;text-align:center}
.ic{width:82px;height:82px;border-radius:20px;box-shadow:0 6px 20px rgba(40,35,25,.12)}

.in{width:100%;padding:14px 16px;border-radius:14px;background:#fff;border:1.5px solid #cfcabd;color:#1a1916;font-size:18px;text-align:center;letter-spacing:.12em;outline:none;-webkit-appearance:none;transition:border-color .15s}
.in:focus{border-color:#ea580c}
.in::placeholder{color:#aea99d}
.bt{width:100%;padding:14px;border-radius:14px;background:#ea580c;border:none;color:#fff;font-family:ui-monospace,monospace;font-size:13px;font-weight:700;letter-spacing:.08em;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;box-shadow:0 2px 9px rgba(234,88,12,.28);transition:transform .12s,opacity .15s}
.bt:active:not(:disabled){transform:scale(.97)}
.bt:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
.er{font-size:11px;color:#dc2626;min-height:16px;font-family:ui-monospace,monospace}
.sg{font-size:9px;color:#aea99d;font-family:ui-monospace,monospace;letter-spacing:.06em}
</style>
